        <div class="kb-adv-form-field kb-adv-form-text-type-input kb-adv-form-infield-type-input kb-field786326237-36 wp-block-kadence-advanced-form-email"><label class="kb-adv-form-label" for="field786326237-36">Email <span class="kb-adv-form-required">*</span></label><input name="email" id="field786326237-36" data-label="Email " type="email" placeholder="" value="" data-type="email" class="kb-field kb-email-field" data-required="yes" required aria-required="true"></div>

        <div class="kb-adv-form-field kb-submit-field kb-field1_default wp-block-kadence-advanced-form-submit"><button class="kb-button kt-button button kb-adv-form-submit-button kb-btn1_default kt-btn-size-standard kt-btn-width-type-auto kb-btn-global-fill kt-btn-has-text-true kt-btn-has-svg-false" type="submit"><span class="kt-btn-inner-text">send</span></button></div>

<script>
  const form = document.getElementById('kb-adv-form-786-cpt-id');
  const submitBtn = form.querySelector('button[type="submit"]');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    formData.append("access_key", "57004cbc-95ed-401b-9b59-52b387e135b8");

    const submitSpan = submitBtn.querySelector('.kt-btn-inner-text');
    const originalText = submitSpan.textContent;
    submitSpan.textContent = "Sending...";
    submitBtn.disabled = true;

    try {
      const response = await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        body: formData
      });
      const data = await response.json();
      if (response.ok) {
        alert("Success! Your message has been sent.");
        form.reset();
      } else {
        alert("Error: " + data.message);
      }
    } catch (error) {
      alert("Something went wrong. Please try again.");
    } finally {
      submitSpan.textContent = originalText;
      submitBtn.disabled = false;
    }
  });
</script>
